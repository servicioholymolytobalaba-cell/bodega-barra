<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bodega HM">
<title>Bodega Barra — Holy Moly Tobalaba</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#085041;--teal-m:#0F6E56;--teal-c:#E1F5EE;
  --coral:#993C1D;--coral-m:#D85A30;--coral-c:#FAECE7;
  --green:#3B6D11;--green-c:#EAF3DE;
  --amber:#854F0B;--amber-c:#FAEEDA;
  --purple:#533AB7;--purple-c:#EEEDFE;
  --gray:#2C2C2A;--gray-m:#888780;--gray-c:#F1EFE8;
  --red-c:#FCEBEB;--red-t:#A32D2D;
  --bg:#F8F8F6;--card:#FFFFFF;--border:#E0DED8;
  --text:#1A1A1A;--text2:#5F5E5A;--text3:#888780;
  --radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:430px;margin:0 auto}
/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);padding:13px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.app-title{font-size:15px;font-weight:600;color:var(--teal)}
.user-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:#fff}
.date-lbl{font-size:11px;color:var(--text3)}
/* NAV */
.nav-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99}
.nav-tab{flex:1;height:44px;border:none;background:none;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;font-family:inherit}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
/* LOGIN */
#scr-login{padding:20px 16px}
.login-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px}
.login-logo{width:56px;height:56px;background:var(--teal-c);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;color:var(--teal)}
.login-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:3px;color:var(--teal)}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:22px}
.field-lbl{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600}
.field-grp{margin-bottom:14px}
select{width:100%;height:44px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;color:var(--text);padding:0 12px;font-size:14px;font-family:inherit;appearance:none;-webkit-appearance:none}
.pin-disp{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.on{background:var(--teal);border-color:var(--teal)}
.pin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:5px}
.pin-key{height:52px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;cursor:pointer;color:var(--text);user-select:none;transition:background .1s}
.pin-key:active{background:var(--teal-c)}
.pin-clr{font-size:11px;color:var(--text3);text-align:right;margin-top:4px;cursor:pointer;text-decoration:underline}
.err-msg{font-size:12px;color:var(--red-t);text-align:center;margin-top:8px;min-height:18px}
/* TAB BODY */
.tab-body{padding:14px 16px}
/* BANNERS */
.banner{display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:var(--radius);font-size:12px;margin-bottom:10px}
.banner-warn{background:var(--amber-c);color:var(--amber);border:1px solid #FAC775}
.banner-ok{background:var(--teal-c);color:var(--teal);border:1px solid #9FE1CB}
/* CATEGORÍAS */
.cat-scroll{display:flex;gap:7px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none;position:sticky;top:100px;z-index:98;background:var(--bg);margin:0 -16px;padding-left:16px;padding-right:8px}
.cat-scroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:500}
.chip.active{background:var(--teal);border-color:var(--teal);color:#fff}
/* SEARCH */
.search-wrap{position:relative;margin:10px 0 6px}
.search-wrap input{width:100%;height:42px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;color:var(--text);padding:0 12px 0 36px;font-size:14px;font-family:inherit}
.search-wrap input:focus{outline:none;border-color:var(--teal)}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px;pointer-events:none}
/* PRODUCTOS */
.prod-list{display:flex;flex-direction:column;gap:4px;padding-bottom:16px}
.prod-row{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 13px;cursor:pointer;overflow:hidden;transition:border-color .1s}
.prod-row:active,.prod-row.sel{border-color:var(--teal);background:var(--teal-c)}
.prod-name{font-size:13px;font-weight:600;margin-bottom:1px}
.prod-cat{font-size:11px;color:var(--text3)}
.prod-stk{font-size:12px;font-weight:700;float:right;margin-top:-28px}
.s-ok{color:var(--green)}.s-zero{color:var(--red-t)}
/* PANEL REGISTRO */
.reg-panel{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-top:12px;margin-bottom:24px}
.reg-tit{font-size:14px;font-weight:700;margin-bottom:13px;color:var(--teal)}
.tipo-grid{display:grid;gap:7px;margin-bottom:13px}
.tipo-btn{height:40px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .1s}
.tipo-btn.t-salida{background:var(--coral-c);border-color:var(--coral-m);color:var(--coral)}
.tipo-btn.t-entrada{background:var(--green-c);border-color:#97C459;color:var(--green)}
.tipo-btn.t-merma{background:var(--amber-c);border-color:#EF9F27;color:var(--amber)}
.tipo-btn.t-traspaso{background:var(--purple-c);border-color:#AFA9EC;color:var(--purple)}
.tipo-btn.t-correccion{background:var(--gray-c);border-color:#B4B2A9;color:var(--gray)}
.sec-lbl{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.turno-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px}
.turno-btn{height:38px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .1s}
.turno-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.qty-row{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.qty-btn{width:46px;height:46px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;font-size:22px;cursor:pointer;color:var(--text);font-family:inherit;flex-shrink:0;transition:background .1s}
.qty-btn:active{background:var(--teal-c)}
.qty-inp{flex:1;height:46px;text-align:center;font-size:22px;font-weight:700;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;color:var(--text);font-family:inherit}
.qty-inp:focus{outline:none;border-color:var(--teal)}
.qty-unit{font-size:11px;color:var(--text3);min-width:32px;font-weight:500}
.note-inp{width:100%;height:60px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;resize:none;margin-bottom:13px}
.note-inp:focus{outline:none;border-color:var(--teal)}
.btn-conf{width:100%;height:50px;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .1s}
.btn-conf:active{opacity:.85}
.btn-conf:disabled{opacity:.4;cursor:not-allowed}
.btn-conf.salida{background:var(--coral-m)}
.btn-conf.entrada{background:#639922}
.btn-conf.merma{background:#BA7517}
.btn-conf.traspaso{background:#7F77DD}
.btn-conf.correccion{background:var(--gray)}
.sending{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;font-size:13px;color:var(--text3)}
/* HISTORIAL */
.hist-item{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.hist-prod{font-size:12px;font-weight:700;flex:1;margin-right:8px}
.badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge.salida{background:var(--coral-c);color:var(--coral)}
.badge.entrada{background:var(--green-c);color:var(--green)}
.badge.merma{background:var(--amber-c);color:var(--amber)}
.badge.traspaso{background:var(--purple-c);color:var(--purple)}
.badge.correccion{background:var(--gray-c);color:var(--gray)}
.hist-meta{font-size:10px;color:var(--text3);margin-bottom:3px}
.hist-sync{font-size:10px;display:flex;align-items:center;gap:4px}
.sync-ok{color:var(--green)}.sync-err{color:var(--red-t)}
/* STOCK */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:22px;font-weight:700}
.pdf-btn{width:100%;height:44px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:14px;transition:background .1s}
.pdf-btn:active{background:var(--gray-c)}
.stk-cat-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:12px}
.stk-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.stk-nombre{font-size:12px;color:var(--text)}
.stk-qty{font-size:12px;font-weight:700}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.toast.ok{border-color:#97C459;color:var(--green)}
.toast.err{border-color:#F09595;color:var(--red-t)}
.toast.warn{border-color:#EF9F27;color:var(--amber)}
.toast.show{opacity:1}
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="scr-login">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-package"></i></div>
    <div class="login-title">Bodega Barra</div>
    <div class="login-sub">Holy Moly Tobalaba</div>
    <div class="field-grp">
      <div class="field-lbl">Usuario</div>
      <select id="sel-usr">
        <option value="">Selecciona tu nombre...</option>
        <optgroup label="Encargados">
          <option value="Jorge|encargado|1234">Jorge</option>
          <option value="Carlos P|encargado|4321">Carlos P</option>
          <option value="Nadeska|encargado|1111">Nadeska</option>
          <option value="Angela|encargado|9876">Angela</option>
          <option value="Claudio|encargado|6789">Claudio</option>
        </optgroup>
        <optgroup label="Bartenders">
          <option value="Bartender 1|bartender|0111">Bartender 1</option>
          <option value="Bartender 2|bartender|0222">Bartender 2</option>
          <option value="Bartender 3|bartender|0333">Bartender 3</option>
        </optgroup>
      </select>
    </div>
    <div class="field-grp">
      <div class="field-lbl">PIN</div>
      <div class="pin-disp">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-grid">
        <div class="pin-key" onclick="pk('1')">1</div>
        <div class="pin-key" onclick="pk('2')">2</div>
        <div class="pin-key" onclick="pk('3')">3</div>
        <div class="pin-key" onclick="pk('4')">4</div>
        <div class="pin-key" onclick="pk('5')">5</div>
        <div class="pin-key" onclick="pk('6')">6</div>
        <div class="pin-key" onclick="pk('7')">7</div>
        <div class="pin-key" onclick="pk('8')">8</div>
        <div class="pin-key" onclick="pk('9')">9</div>
        <div class="pin-key" onclick="pk('bk')" style="font-size:16px"><i class="ti ti-backspace"></i></div>
        <div class="pin-key" onclick="pk('0')">0</div>
        <div class="pin-key" onclick="pk('ok')" style="background:var(--teal-c);color:var(--teal)"><i class="ti ti-check"></i></div>
      </div>
      <div class="pin-clr" onclick="rPin()">Limpiar</div>
    </div>
    <div class="err-msg" id="lerr"></div>
  </div>
</div>
<!-- MAIN -->
<div id="scr-main" style="display:none">
  <div class="header">
    <div class="header-top">
      <span class="app-title"><i class="ti ti-package"></i> Bodega Barra</span>
      <span class="user-badge" onclick="logout()">
        <i class="ti ti-user"></i><span id="lbl-usr">—</span><i class="ti ti-logout" style="font-size:12px;color:var(--text3)"></i>
      </span>
    </div>
    <div class="date-lbl" id="lbl-fecha"></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="goTab('registro')"><i class="ti ti-edit"></i> Registro</button>
    <button class="nav-tab" onclick="goTab('historial')"><i class="ti ti-list"></i> Historial</button>
    <button class="nav-tab" onclick="goTab('stock')"><i class="ti ti-chart-bar"></i> Stock</button>
  </div>
  <!-- REGISTRO -->
  <div id="tab-registro" class="tab-body">
    <div id="bar-note" class="banner banner-warn" style="display:none">
      <i class="ti ti-lock"></i> Modo bartender — solo salidas
    </div>
    <div class="banner banner-ok">
      <i class="ti ti-cloud"></i> Conectado a Google Sheets en tiempo real
    </div>
    <div class="search-wrap">
      <i class="ti ti-search s-ico"></i>
      <input type="text" id="srch" placeholder="Buscar producto..." oninput="renderProds()">
    </div>
    <div class="cat-scroll" id="cat-scroll"></div>
    <div style="height:6px"></div>
    <div class="prod-list" id="prod-list"></div>
    <div id="reg-panel" class="reg-panel" style="display:none">
      <div class="reg-tit" id="reg-tit"></div>
      <div class="sec-lbl">Tipo de movimiento</div>
      <div class="tipo-grid" id="tipo-grid"></div>
      <div class="sec-lbl">Turno</div>
      <div class="turno-row">
        <button class="turno-btn active" id="btn-am" onclick="setTurno('AM')">AM</button>
        <button class="turno-btn" id="btn-pm" onclick="setTurno('PM')">PM</button>
      </div>
      <div class="sec-lbl">Cantidad</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="adjQ(-1)">−</button>
        <input type="number" id="qty" class="qty-inp" value="1" min="1">
        <span class="qty-unit" id="qty-u">und.</span>
      </div>
      <div class="sec-lbl">Observación (opcional)</div>
      <textarea class="note-inp" id="nota" placeholder="Ej: inicio turno, quiebre, merma..."></textarea>
      <button class="btn-conf salida" id="btn-conf" onclick="confirmar()">
        <i class="ti ti-check"></i> Confirmar salida
      </button>
      <div id="sending" class="sending" style="display:none">
        <i class="ti ti-loader"></i> Enviando a Google Sheets...
      </div>
    </div>
  </div>
  <!-- HISTORIAL -->
  <div id="tab-historial" class="tab-body" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
      <span style="font-size:13px;font-weight:700">Movimientos de hoy</span>
      <span style="font-size:11px;color:var(--text3)" id="hist-cnt">0 registros</span>
    </div>
    <div id="hist-list"></div>
  </div>
  <!-- STOCK -->
  <div id="tab-stock" class="tab-body" style="display:none">
    <div class="stat-grid" id="stat-grid"></div>
    <div id="informe-wrap"></div>
    <button class="pdf-btn" onclick="abrirInforme()" id="btn-informe">
      <i class="ti ti-file-text"></i> Generar informe semanal PDF
    </button>
    <button class="pdf-btn" onclick="descargar()" style="border-color:#9FE1CB;color:#085041">
      <i class="ti ti-download"></i> Descargar movimientos del día
    </button>
    <div id="stk-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwSnG3bsdeknzuPcgFb3rDoWeD_WC1jCMGoKS4TxS9HxYV3vMOutyjDt2xhytTF4axB1A/exec";

  ["Vino","Amigo Perro CS","botella",13],["Vino","Amigo Perro SB","botella",4],["Vino","Bodega Uno CS","bidón",6],["Vino","Calyptra Vivendo RS","botella",0],["Vino","Espumante","botella",0],
  ["Ron","Bacardi 8 años 0,75L","botella",1],["Ron","Bacardi Añejo 0,98L","botella",5],["Ron","Bacardi Blanco 1,75L","botella",18],["Ron","Bacardi Coco 0,75L","botella",13],["Ron","Bacardi Manzana 0,7L","botella",16],["Ron","Malibu 0,75L","botella",0],

async function confirmar(){
  if(sel===null)return;
  const p=stk[sel];
  const qty=parseInt(document.getElementById('qty').value)||0;
  const nota=document.getElementById('nota').value.trim();
  if(qty<=0){toast('Cantidad inválida','err');return;}
  if(['salida','merma','traspaso'].includes(tipo)&&qty>p.s){toast('Stock insuficiente','err');return;}
  document.getElementById('btn-conf').disabled=true;
  document.getElementById('sending').style.display='flex';
  const payload={producto:p.nombre,tipo,cantidad:qty,unidad:p.unidad,turno,responsable:usr.nombre,observacion:nota};
  let syncOk=false;
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    const j=await r.json();
    syncOk=j.status==='ok';
  }catch(e){syncOk=false;}
  if(['salida','merma','traspaso'].includes(tipo))p.s=Math.max(0,p.s-qty);
  else if(tipo==='entrada')p.s+=qty;
  const ts=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  movs.unshift({ts,prod:p.nombre,tipo,qty,unidad:p.unidad,turno,user:usr.nombre,nota,sync:syncOk});
  document.getElementById('btn-conf').disabled=false;
  document.getElementById('sending').style.display='none';
  document.getElementById('reg-panel').style.display='none';
  sel=null;
  if(syncOk)toast(`Registrado en Sheets — ${qty} ${p.unidad}`,'ok');
  else toast('Guardado local · sin conexión','warn');
  renderProds();renderHist();renderStk();
}

  [...new Set(stk.map(p=>p.cat))].forEach(c=>{
    txt+=`\n${c.toUpperCase()}\n`;

      txt+=`  ${p.nombre.padEnd(40)}${String(p.s).padStart(4)} ${p.unidad.padEnd(8)}[${p.s===0?'SIN STOCK':'OK'}]\n`;

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));

function generarPDFSemanal(data) {

    if(m.tipo==='entrada')    p.entradas    += Number(m.cantidad);
    else if(m.tipo==='salida')     p.salidas     += Number(m.cantidad);

    else if(m.tipo==='traspaso')   p.traspasos   += Number(m.cantidad);

    </button>

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if(!win) toast('Permite ventanas emergentes para ver el informe','warn');
}
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}
